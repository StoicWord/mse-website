<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSE | Initializing...</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --mse-blue: #0d2c54; 
            --mse-gold: #c5a059; 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--mse-blue);
            font-family: 'Open Sans', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            width: 300px;
        }

        /* The Bolt Icon Animation */
        .icon-box {
            font-size: 4rem;
            color: var(--mse-gold);
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Status Text Styling */
        .status-text {
            height: 30px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #cbd5e0;
        }

        /* Progress Bar */
        .progress-bg {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--mse-gold);
            box-shadow: 0 0 10px var(--mse-gold);
            transition: width 0.5s linear;
        }

        .brand {
            margin-top: 30px;
            font-family: 'Montserrat';
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="icon-box">
            <i class="fas fa-bolt"></i>
        </div>
        
        <div class="status-text" id="status">Initializing...</div>

        <div class="progress-bg">
            <div class="progress-bar" id="bar"></div>
        </div>

        <div class="brand">Maa Sidheswari Electricals</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const barEl = document.getElementById('bar');

        // The sequence of messages
        const steps = [
            { text: "Setting up your experience...", time: 0, progress: 10 },
            { text: "Building things up...", time: 1500, progress: 40 },
            { text: "Authenticating connection...", time: 3000, progress: 75 },
            { text: "Engineering Excellence...", time: 4500, progress: 100 },
            { text: "Redirecting...", time: 5500, progress: 100 }
        ];

        steps.forEach((step) => {
            setTimeout(() => {
                statusEl.innerText = step.text;
                barEl.style.width = step.progress + "%";
                
                // Final Redirect - Changed to home.html
                if (step.text === "Redirecting...") {
                    setTimeout(() => {
                        window.location.href = "home.html"; 
                    }, 800);
                }
            }, step.time);
        });
    </script>
</body>
</html>
